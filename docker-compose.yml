services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voiceapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voiceapp}
      POSTGRES_USER: ${POSTGRES_USER:-voiceapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voiceapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceapp_user} -d ${POSTGRES_DB:-voiceapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (api.rapidvoice.pro) ───────────────────────────────────────────
  backend:
    build:
      context: ./voiceapp_backend
      dockerfile: Dockerfile
    container_name: voiceapp_backend
    restart: unless-stopped
    environment:
      PORT: 4001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-voiceapp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voiceapp}
      JWT_SECRET: ${JWT_SECRET}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_RECORDING_FOLDER: ${AWS_S3_RECORDING_FOLDER:-voice-recordings}
      AWS_SIGNED_URL_EXPIRY: ${AWS_SIGNED_URL_EXPIRY:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voiceapp_network

  # ─── Frontend (www.rapidvoice.pro) ──────────────────────────────────────────
  frontend:
    build:
      context: ./voiceapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
    container_name: voiceapp_frontend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
    networks:
      - voiceapp_network

  # ─── LiveKit ─────────────────────────────────────────────────────────────────
  # 7880 is NOT published — nginx proxies it via /livekit/
  # 7881 (TCP fallback) + 50000-60000/udp (WebRTC media) bypass nginx directly
  livekit:
    image: livekit/livekit-server:latest
    container_name: voiceapp_livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    networks:
      - voiceapp_network

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: voiceapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount host Let's Encrypt certs — same path the nginx config uses
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - livekit
    networks:
      - voiceapp_network

volumes:
  postgres_data:
  nginx_logs:

networks:
  voiceapp_network:
    driver: bridge
