# ─── Upstreams ────────────────────────────────────────────────────────────────
upstream frontend {
    server frontend:4000;
}

upstream backend {
    server backend:4001;
}

upstream livekit {
    server livekit:7880;
}

# ─── HTTP: rapidvoice.pro → www redirect ──────────────────────────────────────
server {
    listen 80;
    server_name rapidvoice.pro;
    return 301 https://www.rapidvoice.pro$request_uri;
}

# ─── HTTPS: rapidvoice.pro → www redirect ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name rapidvoice.pro;

    ssl_certificate     /etc/letsencrypt/live/rapidvoice.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rapidvoice.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://www.rapidvoice.pro$request_uri;
}

# ─── HTTP: www → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    server_name www.rapidvoice.pro;
    return 301 https://www.rapidvoice.pro$request_uri;
}

# ─── HTTPS: www.rapidvoice.pro (Frontend) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.rapidvoice.pro;

    ssl_certificate     /etc/letsencrypt/live/rapidvoice.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rapidvoice.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /socket.io/ {
        proxy_pass         http://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /livekit/ {
        proxy_pass         http://livekit/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── HTTP: api.rapidvoice.pro → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    server_name api.rapidvoice.pro;
    return 301 https://api.rapidvoice.pro$request_uri;
}

# ─── HTTPS: api.rapidvoice.pro (Backend) ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.rapidvoice.pro;

    ssl_certificate     /etc/letsencrypt/live/rapidvoice.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rapidvoice.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /socket.io/ {
        proxy_pass         http://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /livekit/ {
        proxy_pass         http://livekit/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
